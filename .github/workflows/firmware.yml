name: Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      companion: ${{ steps.filter.outputs.companion }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            companion:
              - '.github/workflows/firmware.yml'
              - 'companion/**'
              - 'protocol-fixtures/**'
              - 'docs/ANDROID_COMPANION_SPEC.md'
              - 'docs/BRIDGE_PROTOCOL.md'
              - 'docs/COMPANION_CROSS_PLATFORM_PLAN.md'
              - 'tools/check_android_toolchain.*'
              - 'tools/check_companion_v1_readiness.*'
              - 'tools/check_companion_v1_evidence_bundle.*'
              - 'tools/test_companion_v1_evidence_bundle_contract.*'
              - 'tools/check_desktop_v1_evidence_bundle.*'
              - 'tools/test_desktop_v1_evidence_bundle_contract.*'
              - 'tools/export_companion_release_evidence.*'

  bridge-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run bridge and simulator tests
        run: python -m unittest discover -s bridge -p "test_*.py"

      - name: Verify bundled persona packs
        run: |
          python tools/verify_persona_pack.py spark --json
          python tools/verify_persona_pack.py glow --json

      - name: Run Character Lock red-team dry run
        run: python bridge/character_red_team.py --out-dir output/character-red-team/latest --json

      - name: Upload Character Lock red-team report
        uses: actions/upload-artifact@v7
        with:
          name: character-red-team
          path: |
            output/character-red-team/latest/character_red_team.json
            output/character-red-team/latest/CHARACTER_RED_TEAM.md

      - name: Run engine readiness probe
        run: python bridge/engine_probe.py --out-dir output/engine-probe/latest --json

      - name: Run LiteRT-LM contract smoke
        run: python bridge/litert_lm_contract_smoke.py --out-dir output/litert-lm-smoke/latest --json

      - name: Upload LiteRT-LM contract smoke
        uses: actions/upload-artifact@v7
        with:
          name: litert-lm-contract-smoke
          path: |
            output/litert-lm-smoke/latest/litert_lm_smoke.json
            output/litert-lm-smoke/latest/LITERT_LM_SMOKE.md

      - name: Upload engine readiness probe
        uses: actions/upload-artifact@v7
        with:
          name: engine-probe
          path: |
            output/engine-probe/latest/engine_probe.json
            output/engine-probe/latest/ENGINE_PROBE.md

      - name: Run hardware simulation report
        run: python bridge/hardware_simulator.py --out-dir output/hardware-sim/latest --json

      - name: Upload hardware simulation report
        uses: actions/upload-artifact@v7
        with:
          name: hardware-simulation
          path: |
            output/hardware-sim/latest/hardware_simulation.json
            output/hardware-sim/latest/HARDWARE_SIMULATION.md
            output/hardware-sim/latest/*.serial.log
            output/hardware-sim/latest/*.json

      - name: Run pre-arrival simulation check
        run: python bridge/prearrival_sim_check.py --out-dir output/prearrival-sim/latest --json

      - name: Run LAN bridge smoke report
        run: python bridge/lan_smoke.py --out-dir output/lan-smoke/latest --json

      - name: Upload LAN bridge smoke report
        uses: actions/upload-artifact@v7
        with:
          name: lan-bridge-smoke
          path: |
            output/lan-smoke/latest/lan_smoke.json
            output/lan-smoke/latest/LAN_SMOKE.md
            output/lan-smoke/latest/*.json

      - name: Upload pre-arrival simulation check
        uses: actions/upload-artifact@v7
        with:
          name: prearrival-simulation-check
          path: |
            output/prearrival-sim/latest/prearrival_sim_check.json
            output/prearrival-sim/latest/PREARRIVAL_SIM_CHECK.md
            output/prearrival-sim/latest/hardware-sim/**
            output/prearrival-sim/latest/lan-smoke/**
            output/prearrival-sim/latest/engine-probe/**

  companion-tests:
    needs: changes
    if: needs.changes.outputs.companion == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v4

      - name: Install companion Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Run companion checks
        run: |
          cd companion
          ./gradlew check :app-desktop:c0Spike

      - name: Run Android Play release readiness check
        shell: pwsh
        run: ./tools/check_android_play_release_readiness.ps1 -Json

      - name: Run Android Play Store evidence contract
        shell: pwsh
        run: ./tools/test_android_play_store_evidence_contract.ps1

      - name: Run Android v1 evidence bundle contract
        shell: pwsh
        run: ./tools/test_android_v1_evidence_bundle_contract.ps1

      - name: Run desktop Python runtime payload contract
        shell: pwsh
        run: ./tools/test_desktop_python_runtime_payload_contract.ps1

      - name: Run Desktop v1 evidence bundle contract
        shell: pwsh
        run: ./tools/test_desktop_v1_evidence_bundle_contract.ps1

      - name: Run Companion v1 evidence bundle contract
        shell: pwsh
        run: ./tools/test_companion_v1_evidence_bundle_contract.ps1

      - name: Upload companion C0 spike report
        uses: actions/upload-artifact@v7
        with:
          name: companion-c0-spike
          path: output/companion/c0-spike/SPIKE.md

  companion-platform-builds:
    needs: changes
    if: needs.changes.outputs.companion == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: android-apk
            os: ubuntu-latest
            setup_android: true
            setup_linux_packaging: false
            shell: bash
            install_android_command: |
              yes | sdkmanager --licenses || true
              sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
            command: |
              cd companion
              ./gradlew :app-android:assembleDebug :app-android:assembleRelease :app-android:bundleRelease
            artifact_name: companion-android-apks
            artifact_path: |
              companion/app-android/build/outputs/apk/debug/*.apk
              companion/app-android/build/outputs/apk/release/*.apk
              companion/app-android/build/outputs/bundle/release/*.aab
          - name: desktop-linux
            os: ubuntu-latest
            setup_android: true
            setup_linux_packaging: true
            shell: bash
            install_android_command: |
              yes | sdkmanager --licenses || true
              sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
            command: |
              cd companion
              ./gradlew :app-desktop:packageDistributionForCurrentOS
            artifact_name: companion-desktop-linux
            artifact_path: companion/app-desktop/build/compose/binaries/main/deb/*.deb
          - name: desktop-macos
            os: macos-latest
            setup_android: true
            setup_linux_packaging: false
            shell: bash
            install_android_command: |
              yes | sdkmanager --licenses || true
              sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
            command: |
              cd companion
              ./gradlew :app-desktop:packageDistributionForCurrentOS
            artifact_name: companion-desktop-macos
            artifact_path: companion/app-desktop/build/compose/binaries/main/dmg/*.dmg
          - name: desktop-windows
            os: windows-latest
            setup_android: true
            setup_linux_packaging: false
            shell: pwsh
            install_android_command: |
              1..20 | ForEach-Object { 'y' } | sdkmanager --licenses
              sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
            command: |
              cd companion
              .\gradlew.bat :app-desktop:packageDistributionForCurrentOS
            artifact_name: companion-desktop-windows
            artifact_path: companion/app-desktop/build/compose/binaries/main/msi/*.msi
    name: companion-platform-builds (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v4
        if: matrix.setup_android

      - uses: gradle/actions/setup-gradle@v4

      - name: Install companion Android SDK packages
        if: matrix.setup_android && matrix.shell == 'bash'
        shell: bash
        run: ${{ matrix.install_android_command }}

      - name: Install companion Android SDK packages on Windows
        if: matrix.setup_android && matrix.shell == 'pwsh'
        shell: pwsh
        run: ${{ matrix.install_android_command }}

      - name: Install Linux desktop packaging prerequisites
        if: matrix.setup_linux_packaging
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot

      - name: Build companion platform artifact
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          set +e
          ${{ matrix.command }}
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::group::Compose desktop package diagnostics"
            compose_dir=""
            for candidate in companion/app-desktop/build/compose app-desktop/build/compose; do
              if [ -d "$candidate" ]; then
                compose_dir="$candidate"
                break
              fi
            done
            if [ -n "$compose_dir" ]; then
              find "$compose_dir" -type f \( -name '*.txt' -o -name '*.args.txt' \) -print | sort | while IFS= read -r file; do
                echo "---- $file"
                sed -n '1,240p' "$file"
              done
            else
              echo "No Compose desktop build directory found."
            fi
            echo "::endgroup::"
            exit "$status"
          fi

      - name: Build companion platform artifact on Windows
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          ${{ matrix.command }}
          $status = $LASTEXITCODE
          if ($status -ne 0) {
            Write-Output '::group::Compose desktop package diagnostics'
            $composeDir = @('companion/app-desktop/build/compose', 'app-desktop/build/compose') |
              Where-Object { Test-Path $_ } |
              Select-Object -First 1
            if ($composeDir) {
              Get-ChildItem $composeDir -Recurse -File -Include '*.txt','*.args.txt' |
                Sort-Object FullName |
                ForEach-Object {
                  Write-Output "---- $($_.FullName)"
                  Get-Content $_.FullName -TotalCount 240
                }
            } else {
              Write-Output 'No Compose desktop build directory found.'
            }
            Write-Output '::endgroup::'
            exit $status
          }

      - name: Upload companion platform artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  companion-release-evidence:
    needs: [changes, companion-platform-builds]
    if: needs.changes.outputs.companion == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v4

      - name: Install Android signing verifier
        shell: bash
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;36.0.0"

      - name: Download companion Android APK artifacts
        uses: actions/download-artifact@v7
        with:
          name: companion-android-apks
          path: output/companion/ci-artifacts/companion-android-apks

      - name: Download companion Linux desktop artifacts
        uses: actions/download-artifact@v7
        with:
          name: companion-desktop-linux
          path: output/companion/ci-artifacts/companion-desktop-linux

      - name: Download companion macOS desktop artifacts
        uses: actions/download-artifact@v7
        with:
          name: companion-desktop-macos
          path: output/companion/ci-artifacts/companion-desktop-macos

      - name: Download companion Windows desktop artifacts
        uses: actions/download-artifact@v7
        with:
          name: companion-desktop-windows
          path: output/companion/ci-artifacts/companion-desktop-windows

      - name: Export companion release evidence
        shell: pwsh
        run: |
          ./tools/export_companion_release_evidence.ps1 `
            -Version "${{ github.sha }}" `
            -Commit "${{ github.sha }}" `
            -AndroidArtifactRoot "output/companion/ci-artifacts/companion-android-apks" `
            -DesktopArtifactRoot "output/companion/ci-artifacts" `
            -ApkSignerPath "$env:ANDROID_HOME/build-tools/36.0.0/apksigner" `
            -OutDir "output/companion/release-evidence/ci" `
            -RequireArtifacts `
            -Json

      - name: Upload companion release evidence
        uses: actions/upload-artifact@v7
        with:
          name: companion-release-evidence
          path: |
            output/companion/release-evidence/ci/COMPANION_RELEASE_EVIDENCE.json
            output/companion/release-evidence/ci/COMPANION_RELEASE_EVIDENCE.md
          if-no-files-found: error

  native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade pip platformio

      - name: Run native logic tests
        run: pio test -e native_logic

      - name: Compile native logic with Glow persona
        run: pio test -e native_logic --without-testing
        env:
          STACKCHAN_PERSONA: glow

  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade pip platformio

      - name: Build firmware
        run: pio run -e stackchan -e stackchan_servo_calibration

      - name: Build unit-test firmware
        run: pio test -e stackchan --without-uploading --without-testing

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: stackchan-firmware
          path: |
            .pio/build/stackchan/firmware.bin
            .pio/build/stackchan/firmware.elf
            .pio/build/stackchan/partitions.bin
            .pio/build/stackchan/bootloader.bin
