name: Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: platformio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            platformio-${{ runner.os }}-

      - name: Install PlatformIO
        run: python -m pip install --upgrade pip platformio

      - name: Build firmware
        run: pio run

      - name: Build unit-test firmware
        run: pio test --without-uploading

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: stackchan-firmware
          path: |
            .pio/build/stackchan/firmware.bin
            .pio/build/stackchan/firmware.elf
            .pio/build/stackchan/partitions.bin
            .pio/build/stackchan/bootloader.bin
