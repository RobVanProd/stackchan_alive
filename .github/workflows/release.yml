name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: python -m pip install --upgrade pip platformio -r requirements-preview.txt

      - name: Build firmware
        run: pio run -e stackchan -e stackchan_servo_calibration

      - name: Build unit-test firmware
        run: pio test -e stackchan --without-uploading --without-testing

      - name: Render preview media
        run: python tools/render_preview.py

      - name: Package release
        shell: pwsh
        run: ./tools/package_release.ps1 -Version "${{ github.ref_name }}" -SkipBuild

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $pkg = Get-ChildItem output/release/*.zip | Select-Object -First 1
          Copy-Item .pio/build/stackchan/firmware.bin output/release/firmware-display-only.bin
          Copy-Item .pio/build/stackchan_servo_calibration/firmware.bin output/release/firmware-servo-calibration.bin
          Copy-Item .pio/build/stackchan/bootloader.bin output/release/bootloader.bin
          Copy-Item .pio/build/stackchan/partitions.bin output/release/partitions.bin
          gh release create "${{ github.ref_name }}" `
            $pkg.FullName `
            docs/media/stackchan_alive_preview.png `
            docs/media/stackchan_alive_preview.mp4 `
            docs/media/stackchan_alive_preview.gif `
            output/release/firmware-display-only.bin `
            output/release/firmware-servo-calibration.bin `
            output/release/bootloader.bin `
            output/release/partitions.bin `
            --repo "${{ github.repository }}" `
            --title "Stackchan Alive ${{ github.ref_name }}" `
            --notes-file "output/release/${{ github.ref_name }}/RELEASE_NOTES.md" `
            --prerelease
