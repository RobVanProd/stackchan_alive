[platformio]
default_envs = stackchan

[common]
lib_deps =
  https://github.com/stack-chan/stackchan-arduino.git#b7b98f5
  bblanchon/ArduinoJson@7.4.3
  robotis-git/Dynamixel2Arduino@0.7.0
  madhephaestus/ESP32Servo@0.13.0
  M5Stack/M5Unified@0.2.17
  M5GFX@0.2.24
  https://github.com/mongonta0716/SCServo.git#ee6ee4a
  arminjo/ServoEasing@3.1.0
  tobozo/YAMLDuino@1.5.0

[logic_test_src]
build_src_filter =
  -<*>
  +<persona/EmotionModel.cpp>
  +<persona/AudioSaliency.cpp>
  +<persona/ActiveSpeakerTracker.cpp>
  +<persona/BodyFeedback.cpp>
  +<persona/CommandMap.cpp>
  +<persona/GazeTracker.cpp>
  +<persona/IdleLife.cpp>
  +<persona/IntentEngine.cpp>
  +<persona/EarconSynth.cpp>
  +<persona/SpeechPlanner.cpp>
  +<persona/StereoDirection.cpp>
  +<io/AudioCaptureAdapter.cpp>
  +<io/AudioOut.cpp>
  +<io/BridgeAudioDownlink.cpp>
  +<io/BridgeAudioUplink.cpp>
  +<io/BridgeClient.cpp>
  +<io/BridgeEndpointControl.cpp>
  +<io/BridgeEndpointRegistry.cpp>
  +<io/BridgeEndpointStore.cpp>
  +<io/BridgeNetworkSession.cpp>
  +<io/BridgeSocketWriter.cpp>
  +<io/BridgeWakeGate.cpp>
  +<io/BridgeWiFiClientSocket.cpp>
  +<io/BridgeWiFiProvisioner.cpp>
  +<io/BridgeWiFiProvisioningStore.cpp>
  +<io/BridgeWebSocketTransport.cpp>
  +<io/SpeechPromptBank.cpp>
  +<io/SensorAdapter.cpp>
  +<io/CameraAdapter.cpp>
  +<io/CameraHostProtocol.cpp>
  +<io/ImuAdapter.cpp>
  +<io/BodyTouch.cpp>
  +<io/ProximityAmbient.cpp>
  +<io/SpeechAdapter.cpp>
  +<io/StackChanServoAdapter.cpp>
  +<face/ExpressionMapper.cpp>
  +<face/FaceAnimator.cpp>
  +<motion/ActuationEngine.cpp>
  +<power/PowerCoordinator.cpp>
  +<power/PowerForensics.cpp>
  +<io/OtaPolicy.cpp>
  +<wake/WakeCueSequence.cpp>

[env:stackchan]
platform = espressif32@7.0.1
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep
extra_scripts =
  pre:tools/platformio_generate_persona_assets.py
  pre:tools/platformio_generate_voice_assets.py
test_build_src = yes
test_filter = test_embedded_logic
build_unflags =
  -std=gnu++11
build_flags =
  -std=gnu++17
  -O3
  -ffast-math
  -fno-math-errno
  -D CORE_DEBUG_LEVEL=0
  -D STACKCHAN_ENABLE_SERVOS=0
  -D STACKCHAN_ENABLE_SPEAKER=1
  -D STACKCHAN_REDUCED_MOTION=0
lib_deps =
  ${common.lib_deps}

[env:stackchan_servo_calibration]
platform = espressif32@7.0.1
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep
extra_scripts =
  pre:tools/platformio_generate_persona_assets.py
test_build_src = yes
test_filter = test_embedded_logic
