[env:stackchan]
platform = espressif32@7.0.1
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep
test_build_src = yes
build_unflags =
  -std=gnu++11
build_flags =
  -std=gnu++17
  -D STACKCHAN_ENABLE_SERVOS=0
lib_deps =
  https://github.com/stack-chan/stackchan-arduino.git#b7b98f5
