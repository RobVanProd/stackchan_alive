[platformio]
default_envs = stackchan

[common]
lib_deps =
  https://github.com/stack-chan/stackchan-arduino.git#b7b98f5

[logic_test_src]
build_src_filter =
  -<*>
  +<persona/EmotionModel.cpp>
  +<face/ExpressionMapper.cpp>

[env:stackchan]
platform = espressif32@7.0.1
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep
test_build_src = yes
test_filter = test_embedded_logic
build_unflags =
  -std=gnu++11
build_flags =
  -std=gnu++17
  -D STACKCHAN_ENABLE_SERVOS=0
lib_deps =
  ${common.lib_deps}

[env:stackchan_servo_calibration]
platform = espressif32@7.0.1
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep
test_build_src = yes
test_filter = test_embedded_logic
build_unflags =
  -std=gnu++11
build_flags =
  -std=gnu++17
  -D STACKCHAN_ENABLE_SERVOS=1
lib_deps =
  ${common.lib_deps}

[env:native_logic]
platform = native
test_framework = unity
test_filter = test_native_logic
test_build_src = yes
build_src_filter =
  ${logic_test_src.build_src_filter}
build_flags =
  -std=c++17
  -I test/native_stubs
