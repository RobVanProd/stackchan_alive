  ${env:stackchan_wake_mww_uplink_servos_m5_voiceout.build_flags}
  -D STACKCHAN_BRIDGE_AUDIO_STREAMING_PLAYBACK=1

[env:stackchan_release_forensics]
extends = env:stackchan_voice_v2
; Conservative Windows-safe serial rate. The shared launcher also forces UTF-8
; so esptool's progress display cannot crash under a legacy console code page.
upload_speed = 460800
build_flags =
  ${env:stackchan_voice_v2.build_flags}
  -D STACKCHAN_ENABLE_POWER_FORENSICS=1

[env:stackchan_camera_probe]
extends = env:stackchan_release_forensics
build_unflags =
  -D STACKCHAN_MOTION_ENABLED_AT_BOOT=0
build_flags =
  ${env:stackchan_release_forensics.build_flags}
  -D STACKCHAN_MOTION_ENABLED_AT_BOOT=1
  -D STACKCHAN_AUTONOMOUS_MOTION_AT_BOOT=1
  -D STACKCHAN_ENABLE_CAMERA=1
  -D STACKCHAN_CAMERA_CAPTURE_PROBE_ONLY=1
  -D STACKCHAN_ENABLE_CAMERA_HOST_VISION=1
  -D STACKCHAN_CAMERA_HMIRROR=1
  -D STACKCHAN_CAMERA_VFLIP=0
  ; Camera DMA/control allocations leave a measured steady internal heap of about
  ; 39 KB (30.5 KB observed boot minimum). Keep a 32 KB live safety floor while
  ; leaving the non-camera production profile at its 64 KB default.
  -D STACKCHAN_OTA_MIN_FREE_HEAP_BYTES=32768

; Private regression-isolation profiles. These keep the full paired camera
; runtime but separate the PMIC policy write from periodic PMIC telemetry.
[env:stackchan_camera_probe_pmic_telemetry_only]
extends = env:stackchan_camera_probe
build_unflags =
  -D STACKCHAN_PMIC_VINDPM_MV=4600
build_flags =
  ${env:stackchan_camera_probe.build_flags}
  -D STACKCHAN_PMIC_VINDPM_MV=0
  -D STACKCHAN_ENABLE_PMIC_INPUT_TELEMETRY=1

[env:stackchan_camera_probe_pmic_policy_only]
extends = env:stackchan_camera_probe
build_flags =
  ${env:stackchan_camera_probe.build_flags}
