[env:stackchan_wifi]
extends = env:stackchan
; Enables the runtime Wi-Fi bridge code path for arrival-day lab bring-up.
; Do not bake Wi-Fi credentials into release or lab builds.
; Provision after flashing with:
; wifi set ssid "<name>" pass "<password>" url "ws://host:port/bridge"
extra_scripts =
  ${env:stackchan.extra_scripts}
  pre:tools/platformio_apply_wifi_bridge_env.py
build_flags =
  ${env:stackchan.build_flags}
  -D STACKCHAN_ENABLE_WIFI_BRIDGE=1

