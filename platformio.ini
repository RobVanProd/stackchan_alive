  ; floor. The factory 4.36 V default yields too late under base-input sag.
  -D STACKCHAN_PMIC_VINDPM_MV=4600
  -D STACKCHAN_ENABLE_BODY_POWER_MONITOR=1
  -D STACKCHAN_BODY_POWER_TELEMETRY_PERIOD_MS=250
  -D STACKCHAN_SERVO_POWER_GATE_ON_STOP=1
